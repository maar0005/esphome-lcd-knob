name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    name: ESPHome validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # secrets.yaml is git-ignored; provide a stub so ESPHome can parse the config.
      - name: Create CI secrets
        run: |
          echo 'wifi_ssid: ci-placeholder' > secrets.yaml
          echo 'wifi_password: ci-placeholder' >> secrets.yaml

      - name: Install ESPHome
        run: pip install esphome

      - name: Validate config
        run: esphome config lcd-knob.yaml
