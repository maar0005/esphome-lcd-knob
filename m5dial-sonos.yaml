# ═══════════════════════════════════════════════════════════════════════════════
# M5Stack Dial — Sonos Playlist Controller
# ESPHome configuration using M5 library + LovyanGFX for display
#
# Hardware: M5Stack Dial (ESP32-S3)
#   - GC9A01A 240×240 round display (driven by M5Unified/LovyanGFX)
#   - EC11 rotary encoder
#   - RC522 NFC (I2C) — initialised but not used
#   - PCF8563 RTC (I2C)
#   - Passive buzzer (LEDC/RTTTL)
#
# ─── Quick-start ─────────────────────────────────────────────────────────────
#  1. Copy secrets.yaml.example → secrets.yaml and fill in your values.
#  2. Change `sonos_entity` below to your media_player entity ID.
#  3. For multiple dials, give each a unique `device_name` (e.g. sonos-dial-kitchen).
#  4. Flash: esphome run m5dial-sonos.yaml
# ═══════════════════════════════════════════════════════════════════════════════


# ─────────────────────────────────────────────────────────────────────────────
# SUBSTITUTIONS
# ─────────────────────────────────────────────────────────────────────────────
substitutions:
  device_name: "sonos-dial"
  friendly_name: "Sonos Dial"
  sonos_entity: "media_player.living_room"
  timezone: "Europe/Copenhagen"
  long_press_duration: "800ms"
  screen_off_time: "30000"
  ha_url: "http://homeassistant.local:8123"


# ─────────────────────────────────────────────────────────────────────────────
# ESPHOME CORE
# ─────────────────────────────────────────────────────────────────────────────
esphome:
  name: "${device_name}"
  friendly_name: "${friendly_name}"
  min_version: "2024.2.0"
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: qio


# ─────────────────────────────────────────────────────────────────────────────
# PLATFORM — ESP32-S3FN8, Arduino framework (required by M5 library)
# ─────────────────────────────────────────────────────────────────────────────
esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: arduino


# ─────────────────────────────────────────────────────────────────────────────
# EXTERNAL COMPONENTS — local M5Dial Sonos UI component
# ─────────────────────────────────────────────────────────────────────────────
external_components:
  - source:
      type: git
      url: https://github.com/maar0005/M5dial-Sonos
      ref: main
    components: [m5dial_sonos]


# ─────────────────────────────────────────────────────────────────────────────
# M5DIAL SONOS — Custom display + UI component
# ─────────────────────────────────────────────────────────────────────────────
m5dial_sonos:
  id: sonos_ui
  sonos_entity: "${sonos_entity}"
  screen_off_time: ${screen_off_time}
  volume_step: 2


# ─────────────────────────────────────────────────────────────────────────────
# WI-FI
# ─────────────────────────────────────────────────────────────────────────────
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

improv_serial:


# ─────────────────────────────────────────────────────────────────────────────
# HOME ASSISTANT API
# ─────────────────────────────────────────────────────────────────────────────
api:
  homeassistant_states: true


# ─────────────────────────────────────────────────────────────────────────────
# LOGGER
# ─────────────────────────────────────────────────────────────────────────────
logger:
  level: WARN


# ─────────────────────────────────────────────────────────────────────────────
# I2C — Internal bus (RTC + NFC)
# ─────────────────────────────────────────────────────────────────────────────
i2c:
  sda: GPIO11
  scl: GPIO12
  scan: false


# ─────────────────────────────────────────────────────────────────────────────
# OUTPUTS — Buzzer only (backlight managed by M5 library)
# ─────────────────────────────────────────────────────────────────────────────
output:
  - platform: ledc
    pin: GPIO3
    id: buzzer_output
    frequency: 1000Hz


# ─────────────────────────────────────────────────────────────────────────────
# RTTTL — Buzzer melody player for mode-change feedback beeps
# ─────────────────────────────────────────────────────────────────────────────
rtttl:
  output: buzzer_output
  id: buzzer_rtttl


# ─────────────────────────────────────────────────────────────────────────────
# TIME — HA (primary) + PCF8563 RTC (fallback)
# ─────────────────────────────────────────────────────────────────────────────
time:
  - platform: homeassistant
    id: ha_time
    timezone: "${timezone}"
    on_time_sync:
      then:
        - pcf8563.write_time:

  - platform: pcf8563
    id: rtc_time
    address: 0x51
    timezone: "${timezone}"
    update_interval: 60s


# ─────────────────────────────────────────────────────────────────────────────
# GLOBALS — Minimal shared state for YAML ↔ component bridge
# ─────────────────────────────────────────────────────────────────────────────
globals:
  - id: pending_playlist_name
    type: std::string
    restore_value: false
    initial_value: '""'


# ─────────────────────────────────────────────────────────────────────────────
# SENSOR — Rotary encoder (GPIO40 = A, GPIO41 = B)
# ─────────────────────────────────────────────────────────────────────────────
sensor:
  - platform: rotary_encoder
    id: rotary
    pin_a: GPIO40
    pin_b: GPIO41
    publish_initial_value: false

    on_clockwise:
      then:
        - lambda: 'id(sonos_ui).on_rotary_cw();'
        - lambda: |-
            int mode = id(sonos_ui).get_mode();
            if (mode == 1) {
              id(action_next_track).execute();
            } else if (mode == 2) {
              id(action_set_volume).execute();
            }

    on_anticlockwise:
      then:
        - lambda: 'id(sonos_ui).on_rotary_ccw();'
        - lambda: |-
            int mode = id(sonos_ui).get_mode();
            if (mode == 1) {
              id(action_prev_track).execute();
            } else if (mode == 2) {
              id(action_set_volume).execute();
            }


# ─────────────────────────────────────────────────────────────────────────────
# BINARY SENSORS — Main button
# ─────────────────────────────────────────────────────────────────────────────
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO42
      mode: INPUT_PULLUP
      inverted: true
    id: main_button
    name: "${friendly_name} Button"
    on_multi_click:
      # Short press
      - timing:
          - ON for at most ${long_press_duration}
          - OFF for at least 50ms
        then:
          - lambda: 'id(sonos_ui).on_short_press();'
          - lambda: |-
              int mode = id(sonos_ui).get_mode();
              if (mode == 0) {
                id(action_play_playlist).execute();
              } else {
                id(action_play_pause).execute();
              }

      # Long press — cycle mode
      - timing:
          - ON for at least ${long_press_duration}
        then:
          - lambda: 'id(sonos_ui).on_long_press();'
          - rtttl.play: "mode:d=32,o=5,b=220:c,e"


# ─────────────────────────────────────────────────────────────────────────────
# TEXT SENSORS — Live attribute subscriptions from Home Assistant
# ─────────────────────────────────────────────────────────────────────────────
text_sensor:
  # ── source_list — JSON array of Sonos favourites ───────────────────
  - platform: homeassistant
    id: ts_source_list
    entity_id: "${sonos_entity}"
    attribute: source_list
    on_value:
      then:
        - lambda: 'id(sonos_ui).set_playlist_json(x);'

  # ── media_title ────────────────────────────────────────────────────
  - platform: homeassistant
    id: ts_media_title
    entity_id: "${sonos_entity}"
    attribute: media_title
    on_value:
      then:
        - lambda: 'id(sonos_ui).set_media_title(x);'

  # ── media_artist ───────────────────────────────────────────────────
  - platform: homeassistant
    id: ts_media_artist
    entity_id: "${sonos_entity}"
    attribute: media_artist
    on_value:
      then:
        - lambda: 'id(sonos_ui).set_media_artist(x);'

  # ── volume_level — float string "0.45" (0.0–1.0) ──────────────────
  - platform: homeassistant
    id: ts_volume_level
    entity_id: "${sonos_entity}"
    attribute: volume_level
    on_value:
      then:
        - lambda: 'id(sonos_ui).set_volume_level(atof(x.c_str()));'

  # ── entity_picture — album art URL (unused for now) ────────────────
  - platform: homeassistant
    id: ts_entity_picture
    entity_id: "${sonos_entity}"
    attribute: entity_picture
    on_value:
      then:
        - lambda: |-
            if (x.empty()) return;
            ESP_LOGI("sonos", "Album art URL received (not rendered): %s", x.c_str());

  # ── player state — "playing" | "paused" | "idle" | "off" ──────────
  - platform: homeassistant
    id: ts_player_state
    entity_id: "${sonos_entity}"
    on_value:
      then:
        - lambda: 'id(sonos_ui).set_player_state(x);'


# ─────────────────────────────────────────────────────────────────────────────
# SCRIPTS — HA service calls only
# ─────────────────────────────────────────────────────────────────────────────
script:

  # ── action_play_playlist ────────────────────────────────────────────
  - id: action_play_playlist
    then:
      - lambda: |-
          if (id(sonos_ui).get_playlist_count() == 0) return;
          id(pending_playlist_name) = id(sonos_ui).get_current_playlist_name();
          ESP_LOGI("sonos", "Selecting playlist: %s",
                   id(pending_playlist_name).c_str());
      - script.execute: do_select_source

  # ── do_select_source ────────────────────────────────────────────────
  - id: do_select_source
    then:
      - homeassistant.service:
          service: media_player.select_source
          variables:
            source_name: !lambda 'return id(pending_playlist_name);'
          data:
            entity_id: "${sonos_entity}"
          data_template:
            source: "{{ source_name }}"
      - homeassistant.service:
          service: media_player.shuffle_set
          data:
            entity_id: "${sonos_entity}"
            shuffle: "true"

  # ── action_play_pause ───────────────────────────────────────────────
  - id: action_play_pause
    then:
      - homeassistant.service:
          service: media_player.media_play_pause
          data:
            entity_id: "${sonos_entity}"

  # ── action_next_track ───────────────────────────────────────────────
  - id: action_next_track
    then:
      - homeassistant.service:
          service: media_player.media_next_track
          data:
            entity_id: "${sonos_entity}"

  # ── action_prev_track ───────────────────────────────────────────────
  - id: action_prev_track
    then:
      - homeassistant.service:
          service: media_player.media_previous_track
          data:
            entity_id: "${sonos_entity}"

  # ── action_set_volume ───────────────────────────────────────────────
  - id: action_set_volume
    then:
      - homeassistant.service:
          service: media_player.volume_set
          variables:
            vol: !lambda 'return id(sonos_ui).get_volume();'
          data:
            entity_id: "${sonos_entity}"
          data_template:
            volume_level: "{{ vol }}"
