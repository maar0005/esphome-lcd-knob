# ═══════════════════════════════════════════════════════════════════════════════
# M5Stack Dial — Sonos Playlist Controller
# ESPHome configuration
#
# Minimum ESPHome version: 2024.2 (LVGL support added in 2024.2)
#
# Hardware: M5Stack Dial (ESP32-S3)
#   - GC9A01A 240×240 round display
#   - EC11 rotary encoder
#   - RC522 NFC (I2C) — initialised but not used
#   - PCF8563 RTC (I2C)
#   - Passive buzzer (LEDC/RTTTL)
#
# ─── Quick-start ─────────────────────────────────────────────────────────────
#  1. Copy secrets.yaml.example → secrets.yaml and fill in your values.
#  2. Change `sonos_entity` below to your media_player entity ID.
#  3. Flash: esphome run m5dial-sonos.yaml
#            or use the ESPHome Dashboard.
# ═══════════════════════════════════════════════════════════════════════════════


# ─────────────────────────────────────────────────────────────────────────────
# SUBSTITUTIONS
# These are the only values you should need to change for a new installation.
# ─────────────────────────────────────────────────────────────────────────────
substitutions:
  device_name: "sonos-dial"
  friendly_name: "Sonos Dial"

  # Your Sonos speaker entity in Home Assistant.
  # Find it: Settings → Devices & Services → Entities → filter "media_player"
  sonos_entity: "media_player.living_room"

  # IANA timezone string for the RTC clock sync
  timezone: "Europe/Copenhagen"

  # How long the button must be held to trigger a mode change (long press)
  long_press_duration: "800ms"

  # Inactivity timeout in milliseconds before the screen dims to 10 %
  # Dimming is suppressed while music is playing — see dim_screen_timer.
  screen_off_time: "30000"

  # Base URL of your Home Assistant instance.
  # Album art is fetched by prepending this to the entity_picture attribute path.
  # Examples: "http://homeassistant.local:8123"  or  "http://192.168.1.100:8123"
  ha_url: "http://homeassistant.local:8123"


# ─────────────────────────────────────────────────────────────────────────────
# ESPHOME CORE
# ─────────────────────────────────────────────────────────────────────────────
esphome:
  name: "${device_name}"
  friendly_name: "${friendly_name}"
  min_version: "2024.2.0"   # LVGL requires 2024.2+; ili9xxx gc9a01a model requires 2025.1+
  # Appends the last 3 bytes of the MAC to the device hostname so multiple
  # dials on the same network get unique names (e.g. sonos-dial-a1b2c3).
  name_add_mac_suffix: true
  # Security header — per-device key generation via ESP32 hardware RNG.
  # Must be in the same folder as this YAML file.
  includes:
    - m5dial_security.h

  on_boot:
    # ── Priority 400 — BEFORE the API server starts ─────────────────────────
    # Load (or generate on first boot) the per-device Noise PSK and install it
    # into the API server.  Any connection attempt before this point would be
    # rejected because the placeholder key is not the real one.
    - priority: 400
      then:
        - lambda: |-
            std::string key = ensure_device_key();
            if (key.size() == 44) {
              auto psk = key_to_psk(key);
              id(my_api)->set_noise_psk(psk);   // Install real key before API starts
              id(device_key)  = key;
              id(device_code) = derive_display_code(key);
              ESP_LOGI("security", "Device key loaded, ID: %s",
                       id(device_code).c_str());
            } else {
              ESP_LOGE("security", "Key generation failed — device unusable");
            }

    # ── Priority 200 — after Wi-Fi has attempted to connect ─────────────────
    - priority: 200
      then:
        - lambda: |-
            id(current_mode)    = 0;
            id(playlist_index)  = 0;
            id(playlist_count)  = 0;
            id(current_volume)  = 0.0f;
            id(is_playing)      = false;
        # Update the device code label on the setup page (key was set at priority 400)
        - lvgl.label.update:
            id: lbl_device_code
            text: !lambda 'return id(device_code);'
        # Also update the Setup Key sensor so HA shows the correct value immediately
        - component.update: ts_setup_key
        - script.execute: wake_screen
        # Show setup page if no Wi-Fi; playlist page if already connected
        - if:
            condition:
              wifi.connected:
            then:
              - lvgl.page.show: page_playlist
            else:
              - lvgl.page.show: page_setup


# ─────────────────────────────────────────────────────────────────────────────
# PLATFORM — ESP32-S3, 8 MB flash, Arduino framework
# (Arduino is required by some ESPHome components; IDF is also possible but
#  requires testing with the LVGL + GC9A01A stack.)
# ─────────────────────────────────────────────────────────────────────────────
esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino
  flash_size: 8MB


# ─────────────────────────────────────────────────────────────────────────────
# WI-FI
# No ssid/password — Wi-Fi credentials are provisioned at runtime via
# improv_serial (USB) or the captive-portal hotspot.
# Previously stored credentials are loaded from NVS automatically on boot.
# ─────────────────────────────────────────────────────────────────────────────
wifi:
  # Open fallback AP for provisioning.  Password left blank so any phone can
  # connect without needing to share a passphrase.
  ap:
    ssid: "${friendly_name} Setup"
    password: ""
  # Switch to the main UI page once Wi-Fi connects after provisioning/reboot
  on_connect:
    then:
      - lvgl.page.show: page_playlist

captive_portal:

# Improv Wi-Fi — allows provisioning via USB serial using a web browser
# (https://www.improv-wifi.com).  Works alongside the captive portal.
improv_serial:

# Built-in web server — exposes all HA entities including the Setup Key.
# After provisioning, visit http://<device-ip>/ to copy the Setup Key.
web_server:
  port: 80


# ─────────────────────────────────────────────────────────────────────────────
# HTTP CLIENT — required by online_image below.
# verify_ssl: false avoids issues with HA's self-signed certificate.
# ─────────────────────────────────────────────────────────────────────────────
http_request:
  useragent: ESPHome
  timeout: 10s
  verify_ssl: false


# ─────────────────────────────────────────────────────────────────────────────
# ALBUM ART — Fetched from HA media_player_proxy over HTTP.
# The entity_picture text_sensor (below) calls set_url() + update() each time
# the track changes.  A 64 KB buffer covers typical 240×240 JPEG art.
# ─────────────────────────────────────────────────────────────────────────────
online_image:
  - id: album_art_img
    url: "http://localhost/placeholder.jpg"   # Placeholder — replaced on first entity_picture update; on_error handles the initial 404
    format: JPEG
    type: RGB565         # 16-bit colour — matches display color_depth: 16
    resize: 240x240      # Scale to fill the round display
    buffer_size: 65536   # 64 KB
    on_error:
      then:
        - logger.log:
            level: WARN
            tag: sonos
            format: "Album art fetch failed — keeping previous image"


# ─────────────────────────────────────────────────────────────────────────────
# HOME ASSISTANT API
# id: my_api — required so the on_boot lambda can call set_noise_psk().
# The placeholder key below is overwritten at boot priority 400 with the
# per-device key loaded from NVS.  No API connection is possible with the
# placeholder, so the real key is always installed before any client connects.
# homeassistant_states: true is REQUIRED for text_sensor platform: homeassistant
# to receive entity attribute updates.
# ─────────────────────────────────────────────────────────────────────────────
api:
  id: my_api
  encryption:
    # Placeholder — 44 base64 chars for 32 zero-bytes.
    # Replaced at runtime in on_boot priority 400 before API accepts connections.
    key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
  homeassistant_states: true


# ─────────────────────────────────────────────────────────────────────────────
# OTA UPDATES
# ─────────────────────────────────────────────────────────────────────────────
ota:
  - platform: esphome
    password: !secret ota_password


# ─────────────────────────────────────────────────────────────────────────────
# LOGGER
# Change level to DEBUG when troubleshooting display or Sonos attribute issues.
# ─────────────────────────────────────────────────────────────────────────────
logger:
  level: INFO


# ─────────────────────────────────────────────────────────────────────────────
# I2C — Internal bus
#   0x51 = PCF8563 RTC
#   0x28 = RC522 NFC reader (present on board; we initialise the bus so
#          the chip doesn't glitch, but we don't add an ESPHome component for it)
# ─────────────────────────────────────────────────────────────────────────────
i2c:
  sda: GPIO11
  scl: GPIO12
  scan: false   # Disable scan in production to avoid boot-time log noise


# ─────────────────────────────────────────────────────────────────────────────
# SPI — Display bus
# MOSI and CLK are declared here; CS and DC live on the display component.
# ─────────────────────────────────────────────────────────────────────────────
spi:
  clk_pin:  GPIO6
  mosi_pin: GPIO5


# ─────────────────────────────────────────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────────────────────────────────────────
output:
  # Backlight — PWM on GPIO9
  - platform: ledc
    pin: GPIO9
    id: backlight_output
    frequency: 1000Hz

  # Passive buzzer — PWM on GPIO3; driven by the rtttl component below
  - platform: ledc
    pin: GPIO3
    id: buzzer_output
    frequency: 1000Hz


# ─────────────────────────────────────────────────────────────────────────────
# LIGHT — Monochromatic wrapper around backlight_output.
# Gives us transition effects and a named entity in HA.
# ─────────────────────────────────────────────────────────────────────────────
light:
  - platform: monochromatic
    output: backlight_output
    id: backlight
    name: "${friendly_name} Backlight"
    default_transition_length: 500ms
    restore_mode: ALWAYS_ON
    initial_state:
      brightness: 100%


# ─────────────────────────────────────────────────────────────────────────────
# RTTTL — Buzzer melody player for mode-change feedback beeps
# ─────────────────────────────────────────────────────────────────────────────
rtttl:
  output: buzzer_output
  id: buzzer_rtttl


# ─────────────────────────────────────────────────────────────────────────────
# FONTS
# Fetched from Google Fonts via gfonts:// at build time and cached locally.
# All sizes used in LVGL widgets must be declared here.
# ─────────────────────────────────────────────────────────────────────────────
font:
  - file: "gfonts://Material+Symbols+Outlined"
    id: icon_font_36
    size: 36
    glyphs:
      - "\U0000E050"  # play_arrow
      - "\U0000E034"  # pause
      - "\U0000E89F"  # music_note
  - file: "gfonts://Montserrat"
    id: font_10
    size: 10
  - file: "gfonts://Montserrat"
    id: font_14
    size: 14
  - file: "gfonts://Montserrat"
    id: font_16
    size: 16
  - file: "gfonts://Montserrat"
    id: font_18
    size: 18
  - file: "gfonts://Montserrat"
    id: font_20
    size: 20
  - file: "gfonts://Montserrat"
    id: font_24
    size: 24
  - file: "gfonts://Montserrat"
    id: font_28
    size: 28
  - file: "gfonts://Montserrat"
    id: font_36
    size: 36


# ─────────────────────────────────────────────────────────────────────────────
# TIME
# Dual source: HA (network, primary) + PCF8563 RTC (hardware, fallback).
# on_time_sync pushes the HA time into the RTC so it survives power cycles.
# ─────────────────────────────────────────────────────────────────────────────
time:
  - platform: homeassistant
    id: ha_time
    timezone: "${timezone}"
    on_time_sync:
      then:
        - pcf8563.write_time:

  - platform: pcf8563
    id: rtc_time
    address: 0x51
    timezone: "${timezone}"
    update_interval: 60s


# ─────────────────────────────────────────────────────────────────────────────
# GLOBALS — Shared state between lambdas and scripts
# ─────────────────────────────────────────────────────────────────────────────
globals:
  # Active UI mode: 0 = Playlist, 1 = Now Playing, 2 = Volume
  - id: current_mode
    type: int
    restore_value: false
    initial_value: "0"

  # Zero-based index into playlist_names; wraps at playlist_count
  - id: playlist_index
    type: int
    restore_value: false
    initial_value: "0"

  # Number of playlists in playlist_names (0 means none loaded yet)
  - id: playlist_count
    type: int
    restore_value: false
    initial_value: "0"

  # Volume 0.0–1.0, mirroring Sonos volume_level attribute
  - id: current_volume
    type: float
    restore_value: false
    initial_value: "0.0"

  # Playback state mirror from HA: true = playing
  - id: is_playing
    type: bool
    restore_value: false
    initial_value: "false"

  # Parsed Sonos favourites list; filled by the source_list text_sensor
  - id: playlist_names
    type: std::vector<std::string>
    restore_value: false

  # Temporary buffer holding the playlist name for the HA service call.
  # We can't reference a std::string local inside the async service template,
  # so we stash it here before firing do_select_source.
  - id: pending_playlist_name
    type: std::string
    restore_value: false
    initial_value: '""'

  # ── Security globals (set at boot priority 400 by m5dial_security.h) ─────
  # Full 44-char base64 API key — exposed via the Setup Key text_sensor.
  - id: device_key
    type: std::string
    restore_value: false
    initial_value: '""'

  # 6-char uppercase identifier derived from the key — shown on the display
  # during setup so the user can identify which device they are pairing.
  - id: device_code
    type: std::string
    restore_value: false
    initial_value: '"------"'


# ─────────────────────────────────────────────────────────────────────────────
# DISPLAY — GC9A01A 240×240 round, SPI
# bgr + invert_colors corrects the panel's native colour mapping on M5Dial.
# update_interval: never → LVGL drives all redraws; no draw lambda needed.
# ─────────────────────────────────────────────────────────────────────────────
display:
  - platform: ili9xxx
    model: gc9a01a
    id: round_display
    cs_pin:    GPIO7
    dc_pin:    GPIO4
    reset_pin: GPIO8
    rotation:  0
    color_order: bgr
    invert_colors: true
    update_interval: never


# ─────────────────────────────────────────────────────────────────────────────
# LVGL — UI framework (requires ESPHome ≥ 2024.2)
#
# Three pages, one per mode.  All share a dark (#1a1a1a) background and
# orange (#FF9500) accent colour.
# ─────────────────────────────────────────────────────────────────────────────
lvgl:
  displays:
    - round_display
  color_depth: 16
  bg_color:    0x1A1A1A

  pages:

    # ── PAGE SETUP: PROVISIONING ─────────────────────────────────────────────
    # Shown on first boot (no Wi-Fi) and after factory reset.
    # Guides the user through Wi-Fi provisioning and HA pairing.
    # Switches to page_playlist automatically via wifi.on_connected above.
    - id: page_setup
      bg_color: 0x1A1A1A
      widgets:
        # Header
        - label:
            text: "SETUP"
            align: CENTER
            y: -88
            text_font: font_24
            text_color: 0xFF9500

        # Wi-Fi provisioning instruction
        - label:
            text: "Join Wi-Fi hotspot:"
            align: CENTER
            y: -58
            text_font: font_14
            text_color: 0xAAAAAA

        # AP SSID the device broadcasts
        - label:
            text: "${friendly_name} Setup"
            align: CENTER
            y: -36
            text_font: font_16
            text_color: 0xFFFFFF

        # Divider hint
        - label:
            text: "then open web page"
            align: CENTER
            y: -8
            text_font: font_14
            text_color: 0xAAAAAA

        - label:
            text: "for API Setup Key"
            align: CENTER
            y: 12
            text_font: font_14
            text_color: 0xAAAAAA

        # Device identifier — updated at boot from device_code global
        - label:
            text: "ID:"
            align: CENTER
            y: 42
            text_font: font_14
            text_color: 0x666666

        - label:
            id: lbl_device_code
            text: "------"
            align: CENTER
            y: 62
            text_font: font_24
            text_color: 0xFF9500

    # ── PAGE 0: PLAYLIST ────────────────────────────────────────────────────
    - id: page_playlist
      bg_color: 0x1A1A1A
      widgets:
        # Music note glyph — decorative header
        - label:
            id: lbl_music_icon
            text: "♫"
            align: TOP_MID
            y: 18
            text_font: font_28
            text_color: 0xFF9500

        # Currently selected playlist name; scrolls if wider than 200 px
        - label:
            id: lbl_playlist_name
            text: "Loading..."
            align: CENTER
            y: -10
            text_font: font_24
            text_color: 0xFFFFFF
            long_mode: SCROLL_CIRCULAR
            width: 200

        # "x / y" counter
        - label:
            id: lbl_playlist_index
            text: "- / -"
            align: BOTTOM_MID
            y: -40
            text_font: font_18
            text_color: 0xAAAAAA

        # Mode indicator dots — three small dots, bottom-right corner.
        # Active dot is orange; inactive dots are dark grey.
        - label:
            id: dot_p0_0
            text: "●"
            align: BOTTOM_RIGHT
            x: -14
            y: -12
            text_font: font_14
            text_color: 0xFF9500   # Active (mode 0)
        - label:
            id: dot_p0_1
            text: "●"
            align: BOTTOM_RIGHT
            x: -30
            y: -12
            text_font: font_14
            text_color: 0x444444
        - label:
            id: dot_p0_2
            text: "●"
            align: BOTTOM_RIGHT
            x: -46
            y: -12
            text_font: font_14
            text_color: 0x444444

    # ── PAGE 1: NOW PLAYING (album art) ─────────────────────────────────────
    # Layout (bottom → top in LVGL z-order = declaration order here):
    #   1. Full-screen album art (240×240 JPEG, fetched from HA)
    #   2. Dark bottom strip (obj) for text readability over the image
    #   3. Track title + artist labels
    #   4. Play/pause icon (top, small dark pill)
    #   5. Mode dots
    - id: page_now_playing
      bg_color: 0x000000
      widgets:
        # ── Album art — full-screen background ────────────────────────────
        # Rendered first so all other widgets draw on top of it.
        - image:
            id: lbl_album_art
            src: album_art_img
            align: CENTER

        # ── Dark bottom strip — improves text contrast over busy artwork ──
        # 80 px tall, fully black, 70 % opacity.
        - obj:
            align: BOTTOM_MID
            width: 240
            height: 80
            bg_color: 0x000000
            bg_opa: 71%
            border_width: 0
            pad_all: 0
            radius: 0

        # ── Track title ───────────────────────────────────────────────────
        - label:
            id: lbl_track_title
            text: "—"
            align: BOTTOM_MID
            y: -48
            text_font: font_18
            text_color: 0xFFFFFF
            long_mode: SCROLL_CIRCULAR
            width: 200

        # ── Artist name ───────────────────────────────────────────────────
        - label:
            id: lbl_artist
            text: ""
            align: BOTTOM_MID
            y: -25
            text_font: font_14
            text_color: 0xCCCCCC
            long_mode: SCROLL_CIRCULAR
            width: 200

        # ── Play ▶ / Pause ⏸ icon — small pill at the top ────────────────
        - label:
            id: lbl_play_icon
            text: "▶"
            align: TOP_MID
            y: 14
            text_font: font_20
            text_color: 0xFF9500
            bg_color: 0x000000
            bg_opa: 63%

        # ── Mode indicator dots (dot 1 = orange = active) ─────────────────
        - label:
            id: dot_p1_0
            text: "●"
            align: BOTTOM_RIGHT
            x: -14
            y: -12
            text_font: font_14
            text_color: 0x444444
        - label:
            id: dot_p1_1
            text: "●"
            align: BOTTOM_RIGHT
            x: -30
            y: -12
            text_font: font_14
            text_color: 0xFF9500   # Active (mode 1)
        - label:
            id: dot_p1_2
            text: "●"
            align: BOTTOM_RIGHT
            x: -46
            y: -12
            text_font: font_14
            text_color: 0x444444

    # ── PAGE 2: VOLUME ──────────────────────────────────────────────────────
    - id: page_volume
      bg_color: 0x1A1A1A
      widgets:
        # "Volume" header label
        - label:
            id: lbl_volume_title
            text: "Volume"
            align: TOP_MID
            y: 18
            text_font: font_18
            text_color: 0xFF9500

        # Arc around the perimeter — visual level indicator.
        # adjustable: false because we drive the value programmatically.
        # start_angle/end_angle: 135→45 draws a 270° arc (gap at bottom).
        - arc:
            id: arc_volume
            align: CENTER
            width: 210
            height: 210
            min_value: 0
            max_value: 100
            value: 0
            adjustable: false
            arc_color: 0x333333   # background track (main part)
            arc_width: 8
            indicator:
              arc_color: 0xFF9500 # foreground value arc
              arc_width: 8
            start_angle: 135
            end_angle: 45

        # Large percentage number in the centre of the arc
        - label:
            id: lbl_volume_pct
            text: "0%"
            align: CENTER
            text_font: font_36
            text_color: 0xFFFFFF

        # Mode indicator dots (dot 2 = orange = active)
        - label:
            id: dot_p2_0
            text: "●"
            align: BOTTOM_RIGHT
            x: -14
            y: -12
            text_font: font_14
            text_color: 0x444444
        - label:
            id: dot_p2_1
            text: "●"
            align: BOTTOM_RIGHT
            x: -30
            y: -12
            text_font: font_14
            text_color: 0x444444
        - label:
            id: dot_p2_2
            text: "●"
            align: BOTTOM_RIGHT
            x: -46
            y: -12
            text_font: font_14
            text_color: 0xFF9500   # Active (mode 2)


# ─────────────────────────────────────────────────────────────────────────────
# SENSOR — Rotary encoder (GPIO40 = A, GPIO41 = B)
# on_clockwise / on_counter_clockwise fire on each detent; no raw values used.
# ─────────────────────────────────────────────────────────────────────────────
sensor:
  - platform: rotary_encoder
    id: rotary
    pin_a: GPIO40
    pin_b: GPIO41
    publish_initial_value: false

    on_clockwise:
      then:
        - script.execute: wake_screen
        - lambda: |-
            switch (id(current_mode)) {
              case 0:  // Playlist — advance to next (wrap)
                if (id(playlist_count) > 0) {
                  id(playlist_index) = (id(playlist_index) + 1) % id(playlist_count);
                  id(update_playlist_display).execute();
                }
                break;
              case 1:  // Now Playing — skip to next track
                id(action_next_track).execute();
                break;
              case 2:  // Volume — +2 %, clamped to 100 %
                {
                  float v = id(current_volume) + 0.02f;
                  if (v > 1.0f) v = 1.0f;
                  id(current_volume) = v;
                  id(action_set_volume).execute();
                  id(update_volume_display).execute();
                }
                break;
            }

    on_anticlockwise:
      then:
        - script.execute: wake_screen
        - lambda: |-
            switch (id(current_mode)) {
              case 0:  // Playlist — go to previous (wrap)
                if (id(playlist_count) > 0) {
                  id(playlist_index) =
                    (id(playlist_index) - 1 + id(playlist_count)) % id(playlist_count);
                  id(update_playlist_display).execute();
                }
                break;
              case 1:  // Now Playing — previous track
                id(action_prev_track).execute();
                break;
              case 2:  // Volume — -2 %, clamped to 0 %
                {
                  float v = id(current_volume) - 0.02f;
                  if (v < 0.0f) v = 0.0f;
                  id(current_volume) = v;
                  id(action_set_volume).execute();
                  id(update_volume_display).execute();
                }
                break;
            }

  # Wi-Fi signal strength — creates a diagnostic entity in HA automatically
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s


# ─────────────────────────────────────────────────────────────────────────────
# BINARY SENSORS — Buttons
# ─────────────────────────────────────────────────────────────────────────────
binary_sensor:
  # ── Main button GPIO42 ──────────────────────────────────────────────────
  # on_multi_click distinguishes short press (< long_press_duration) from
  # long press (≥ long_press_duration).
  - platform: gpio
    pin:
      number: GPIO42
      mode: INPUT_PULLUP
      inverted: true
    id: main_button
    name: "${friendly_name} Button"
    on_multi_click:
      # Short press — released before long_press_duration elapses
      - timing:
          - ON for at most ${long_press_duration}
          - OFF for at least 50ms
        then:
          - script.execute: wake_screen
          - lambda: |-
              switch (id(current_mode)) {
                case 0:  // Playlist → play selected playlist with shuffle
                  id(action_play_playlist).execute();
                  break;
                case 1:  // Now Playing → toggle play/pause
                case 2:  // Volume → toggle play/pause
                  id(action_play_pause).execute();
                  break;
              }

      # Long press — held for at least long_press_duration → cycle mode
      - timing:
          - ON for at least ${long_press_duration}
        then:
          - script.execute: wake_screen
          - script.execute: next_mode

  # ── Hold / side button GPIO46 ───────────────────────────────────────────
  # Wired as normally-open to GND; reserved for future use.
  - platform: gpio
    pin:
      number: GPIO46
      mode: INPUT_PULLUP
      inverted: true
    id: hold_button
    name: "${friendly_name} Hold Button"
    on_press:
      then:
        - script.execute: wake_screen


# ─────────────────────────────────────────────────────────────────────────────
# TEXT SENSORS — Live attribute subscriptions from Home Assistant
#
# platform: homeassistant  +  attribute:  subscribes to a single attribute
# on the given entity.  The value arrives as a string every time HA updates it.
# homeassistant_states: true (set in api: above) is required for this to work.
# ─────────────────────────────────────────────────────────────────────────────
text_sensor:
  # ── source_list ─────────────────────────────────────────────────────────
  # Arrives as a JSON array string, e.g.: ["Jazz Classics","Rock Mix"]
  # We parse it into the playlist_names global vector with a hand-rolled
  # parser — more reliable in a C++ lambda than calling an external library.
  - platform: homeassistant
    id: ts_source_list
    entity_id: "${sonos_entity}"
    attribute: source_list
    on_value:
      then:
        - lambda: |-
            id(playlist_names).clear();

            std::string raw = x;

            // Trim leading/trailing whitespace
            size_t s = raw.find_first_not_of(" \t\r\n");
            size_t e = raw.find_last_not_of(" \t\r\n");
            if (s == std::string::npos) { raw.clear(); }
            else { raw = raw.substr(s, e - s + 1); }

            // Must start with '[' — if not, the attribute was not a list
            if (raw.empty() || raw.front() != '[') {
              ESP_LOGW("sonos", "source_list is not a JSON array: %s", raw.c_str());
              id(playlist_count) = 0;
              id(update_playlist_display).execute();
              return;
            }

            // Strip the outer [ ]
            raw = raw.substr(1, raw.size() > 2 ? raw.size() - 2 : 0);

            // Walk through the comma-separated quoted strings
            bool   in_quote    = false;
            bool   escape_next = false;
            std::string token;

            for (char c : raw) {
              if (escape_next) {
                token      += c;
                escape_next = false;
                continue;
              }
              if (c == '\\') { escape_next = true; continue; }
              if (c == '"') {
                if (!in_quote) {
                  in_quote = true;
                  token.clear();
                } else {
                  if (!token.empty()) id(playlist_names).push_back(token);
                  in_quote = false;
                }
                continue;
              }
              if (in_quote) token += c;
              // Commas outside quotes are separators — the quote pairing handles that
            }

            id(playlist_count) = (int)id(playlist_names).size();

            // Clamp index to the new list length
            if (id(playlist_count) > 0 &&
                id(playlist_index) >= id(playlist_count)) {
              id(playlist_index) = 0;
            }

            id(update_playlist_display).execute();
            ESP_LOGI("sonos", "Parsed %d playlists from source_list",
                     id(playlist_count));

  # ── media_title ─────────────────────────────────────────────────────────
  - platform: homeassistant
    id: ts_media_title
    entity_id: "${sonos_entity}"
    attribute: media_title
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_track_title
            text: !lambda 'return x.c_str();'

  # ── media_artist ────────────────────────────────────────────────────────
  - platform: homeassistant
    id: ts_media_artist
    entity_id: "${sonos_entity}"
    attribute: media_artist
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_artist
            text: !lambda 'return x.c_str();'

  # ── volume_level — arrives as float string "0.45" (0.0–1.0) ────────────
  - platform: homeassistant
    id: ts_volume_level
    entity_id: "${sonos_entity}"
    attribute: volume_level
    on_value:
      then:
        - lambda: |-
            float vol = atof(x.c_str());
            vol = vol < 0.0f ? 0.0f : (vol > 1.0f ? 1.0f : vol);
            id(current_volume) = vol;
            id(update_volume_display).execute();

  # ── entity_picture — album art URL from HA media_player proxy ──────────
  # HA returns a relative path such as:
  #   /api/media_player_proxy/media_player.living_room?token=abc&cache=xyz
  # We prepend ha_url to build the full URL and hand it to online_image.
  - platform: homeassistant
    id: ts_entity_picture
    entity_id: "${sonos_entity}"
    attribute: entity_picture
    on_value:
      then:
        - lambda: |-
            if (x.empty()) return;
            // Accept both absolute URLs and relative HA proxy paths
            std::string url = (x.rfind("http", 0) == 0) ? x
                                                         : "${ha_url}" + x;
            id(album_art_img).set_url(url.c_str());
            id(album_art_img).update();
            ESP_LOGI("sonos", "Loading album art: %s", url.c_str());

  # ── player state — "playing" | "paused" | "idle" | "off" ───────────────
  # We subscribe to the entity state itself (no attribute: key needed).
  - platform: homeassistant
    id: ts_player_state
    entity_id: "${sonos_entity}"
    on_value:
      then:
        - lambda: |-
            id(is_playing) = (x == "playing");
        # When playback starts: show album art page, wake screen, (re)start
        # dim timer — the timer will not dim while is_playing is true.
        - if:
            condition:
              lambda: 'return id(is_playing);'
            then:
              - light.turn_on:
                  id: backlight
                  brightness: 100%
              - script.execute: dim_screen_timer
              - lambda: 'id(current_mode) = 1;'
              - lvgl.page.show: page_now_playing
              - lvgl.label.update:
                  id: lbl_play_icon
                  text: "⏸"
            else:
              # Not playing: restart dim countdown, update icon
              - script.execute: dim_screen_timer
              - lvgl.label.update:
                  id: lbl_play_icon
                  text: "▶"


  # ── Setup Key — Exposes the per-device API key to Home Assistant and the web UI.
  # Copy this value from the HA entity (or from http://<device-ip>/) and paste
  # it into the ESPHome device entry in HA when prompted for the encryption key.
  - platform: template
    id: ts_setup_key
    name: "${friendly_name} Setup Key"
    icon: "mdi:key-variant"
    entity_category: diagnostic
    # Returns the 44-char base64 key loaded/generated at boot priority 400
    lambda: 'return id(device_key);'
    update_interval: never   # Only pushed on boot and after factory reset


# ─────────────────────────────────────────────────────────────────────────────
# FACTORY RESET BUTTON
# Generates a brand-new device key and installs it as the active Noise PSK.
# After pressing this button:
#   1. The Setup Key entity shows the new key.
#   2. HA will lose connection (old key no longer valid).
#   3. Re-add the device in HA using the new key shown in the entity/web page.
# ─────────────────────────────────────────────────────────────────────────────
button:
  - platform: template
    name: "${friendly_name} Factory Reset"
    icon: "mdi:lock-reset"
    entity_category: config
    on_press:
      then:
        - lambda: |-
            std::string key = generate_device_key();
            nvs_save_device_key(key);
            id(device_key)  = key;
            id(device_code) = derive_display_code(key);
            auto psk = key_to_psk(key);
            id(my_api)->set_noise_psk(psk);   // Install new key immediately
            ESP_LOGW("security", "Factory reset — new device ID: %s",
                     id(device_code).c_str());
        # Refresh the Setup Key entity so HA sees the new value
        - component.update: ts_setup_key
        # Show setup page and update the device code label on the display
        - lvgl.page.show: page_setup
        - lvgl.label.update:
            id: lbl_device_code
            text: !lambda 'return id(device_code);'


# ─────────────────────────────────────────────────────────────────────────────
# SCRIPTS
# ─────────────────────────────────────────────────────────────────────────────
script:

  # ── wake_screen ───────────────────────────────────────────────────────────
  # Restores full brightness and resets the inactivity timer.
  # Called at the start of every user interaction.
  - id: wake_screen
    then:
      - light.turn_on:
          id: backlight
          brightness: 100%
      # Restart the dim timer (mode: restart makes the next call reset the delay)
      - script.execute: dim_screen_timer

  # ── dim_screen_timer ──────────────────────────────────────────────────────
  # Waits screen_off_time ms then dims the backlight to 10 % — but only when
  # music is NOT playing.  While Sonos is playing the screen stays bright.
  # mode: restart means each call to script.execute restarts the countdown,
  # so interactions and play/pause state changes reset the timer.
  - id: dim_screen_timer
    mode: restart
    then:
      - delay: !lambda 'return (uint32_t)${screen_off_time};'
      - if:
          condition:
            lambda: 'return !id(is_playing);'
          then:
            - light.turn_on:
                id: backlight
                brightness: 10%

  # ── next_mode ─────────────────────────────────────────────────────────────
  # Advances current_mode 0→1→2→0, shows the matching LVGL page, beeps.
  - id: next_mode
    then:
      - lambda: 'id(current_mode) = (id(current_mode) + 1) % 3;'
      - script.execute: mode_beep
      # Switch page — use conditional actions so the LVGL thread is respected
      - if:
          condition:
            lambda: 'return id(current_mode) == 0;'
          then:
            - lvgl.page.show: page_playlist
      - if:
          condition:
            lambda: 'return id(current_mode) == 1;'
          then:
            - lvgl.page.show: page_now_playing
      - if:
          condition:
            lambda: 'return id(current_mode) == 2;'
          then:
            - lvgl.page.show: page_volume
            - script.execute: update_volume_display

  # ── mode_beep ─────────────────────────────────────────────────────────────
  # Two short ascending notes played via RTTTL on mode change.
  - id: mode_beep
    then:
      - rtttl.play: "mode:d=32,o=5,b=220:c,e"

  # ── update_playlist_display ───────────────────────────────────────────────
  # Refreshes the playlist name and index counter on page 0.
  - id: update_playlist_display
    then:
      - if:
          condition:
            lambda: 'return id(playlist_count) == 0;'
          then:
            - lvgl.label.update:
                id: lbl_playlist_name
                text: "No favourites found"
            - lvgl.label.update:
                id: lbl_playlist_index
                text: "- / -"
          else:
            - lvgl.label.update:
                id: lbl_playlist_name
                text: !lambda |
                  int idx = id(playlist_index);
                  return id(playlist_names)[idx].c_str();
            - lvgl.label.update:
                id: lbl_playlist_index
                text: !lambda |
                  char buf[16];
                  snprintf(buf, sizeof(buf), "%d / %d",
                           id(playlist_index) + 1, id(playlist_count));
                  return std::string(buf);

  # ── update_volume_display ─────────────────────────────────────────────────
  # Refreshes the arc position and percentage label on page 2.
  - id: update_volume_display
    then:
      - lvgl.arc.update:
          id: arc_volume
          value: !lambda 'return (int)(id(current_volume) * 100.0f + 0.5f);'
      - lvgl.label.update:
          id: lbl_volume_pct
          text: !lambda |
            char buf[8];
            snprintf(buf, sizeof(buf), "%d%%",
                     (int)(id(current_volume) * 100.0f + 0.5f));
            return std::string(buf);

  # ── action_play_playlist ──────────────────────────────────────────────────
  # Stores the selected playlist name, then fires the HA service calls.
  # We cannot reference a stack-allocated std::string from inside
  # homeassistant.service data_template, so we buffer it in the global first.
  - id: action_play_playlist
    then:
      - lambda: |-
          if (id(playlist_count) == 0) return;
          id(pending_playlist_name) = id(playlist_names)[id(playlist_index)];
          ESP_LOGI("sonos", "Selecting playlist: %s",
                   id(pending_playlist_name).c_str());
      - script.execute: do_select_source

  # ── do_select_source ──────────────────────────────────────────────────────
  # Fires the two HA service calls: select_source, then shuffle_set true.
  # `variables:` passes C++ values; `data_template:` forwards them as HA
  # Jinja2 template variables — this is the correct ESPHome pattern.
  - id: do_select_source
    then:
      - homeassistant.service:
          service: media_player.select_source
          variables:
            source_name: !lambda 'return id(pending_playlist_name);'
          data:
            entity_id: "${sonos_entity}"
          data_template:
            source: "{{ source_name }}"
      - homeassistant.service:
          service: media_player.shuffle_set
          data:
            entity_id: "${sonos_entity}"
            shuffle: "true"

  # ── action_play_pause ─────────────────────────────────────────────────────
  - id: action_play_pause
    then:
      - homeassistant.service:
          service: media_player.media_play_pause
          data:
            entity_id: "${sonos_entity}"

  # ── action_next_track ─────────────────────────────────────────────────────
  - id: action_next_track
    then:
      - homeassistant.service:
          service: media_player.media_next_track
          data:
            entity_id: "${sonos_entity}"

  # ── action_prev_track ─────────────────────────────────────────────────────
  - id: action_prev_track
    then:
      - homeassistant.service:
          service: media_player.media_previous_track
          data:
            entity_id: "${sonos_entity}"

  # ── action_set_volume ─────────────────────────────────────────────────────
  # Sends current_volume (0.0–1.0) to Sonos.
  # The volume_level service parameter expects a float; we convert to string
  # for the HA template, which HA then casts back to float internally.
  - id: action_set_volume
    then:
      - homeassistant.service:
          service: media_player.volume_set
          variables:
            vol: !lambda 'return id(current_volume);'
          data:
            entity_id: "${sonos_entity}"
          data_template:
            volume_level: "{{ vol }}"
